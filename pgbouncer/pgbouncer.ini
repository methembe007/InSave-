[databases]
; Primary database for write operations
insavein_primary = host=postgres-primary port=5432 dbname=insavein

; Read replicas for read-heavy operations
insavein_replica1 = host=postgres-replica1 port=5432 dbname=insavein
insavein_replica2 = host=postgres-replica2 port=5432 dbname=insavein

; Alias for load-balanced read operations
insavein_read = host=postgres-replica1,postgres-replica2 port=5432 dbname=insavein

[pgbouncer]
; Connection pooling mode
; transaction = each transaction gets a new connection (recommended for microservices)
pool_mode = transaction

; Listen on all interfaces
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Connection limits
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Connection timeouts
server_connect_timeout = 15
server_idle_timeout = 600
server_lifetime = 3600
server_login_retry = 15

; Query timeouts
query_timeout = 30
query_wait_timeout = 120

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin console
admin_users = postgres
stats_users = postgres

; DNS
dns_max_ttl = 15
dns_nxdomain_ttl = 15

; TLS (disabled for internal Docker network)
;client_tls_sslmode = disable
;server_tls_sslmode = disable

; Performance
max_packet_size = 2147483647
pkt_buf = 4096
sbuf_loopcnt = 5

; Ignore startup parameters
ignore_startup_parameters = extra_float_digits,options

; Application name passthrough
application_name_add_host = 1

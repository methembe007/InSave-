services:
  # PostgreSQL Primary Database (Write Operations)
  postgres-primary:
    image: postgres:15-alpine
    container_name: postgres-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insavein
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      REPLICATION_PASSWORD: replicator_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init-primary.sh:/docker-entrypoint-initdb.d/01-init-primary.sh:ro
      - ./postgres/create-app-user.sh:/docker-entrypoint-initdb.d/02-create-app-user.sh:ro
      - ./migrations:/migrations:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insavein-network

  # PostgreSQL Read Replica 1 (Read Operations - Education & Notification Services)
  postgres-replica1:
    image: postgres:15-alpine
    container_name: postgres-replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insavein
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      REPLICA_NAME: replica1
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
      - ./postgres/replica/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        /docker-entrypoint-initdb.d/init-replica.sh
      fi &&
      postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insavein-network

  # PostgreSQL Read Replica 2 (Read Operations - Analytics Service)
  postgres-replica2:
    image: postgres:15-alpine
    container_name: postgres-replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insavein
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      REPLICA_NAME: replica2
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
      - ./postgres/replica/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        /docker-entrypoint-initdb.d/init-replica.sh
      fi &&
      postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insavein-network

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres-primary:5432/insavein"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica1:
        condition: service_healthy
      postgres-replica2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 5432 -U postgres -d pgbouncer -c 'SHOW POOLS;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insavein-network

  # Replication Lag Monitor
  replication-monitor:
    image: postgres:15-alpine
    container_name: replication-monitor
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PRIMARY_HOST: postgres-primary
    volumes:
      - ./monitoring/check-replication-lag.sh:/usr/local/bin/check-replication-lag.sh:ro
    command: >
      sh -c "chmod +x /usr/local/bin/check-replication-lag.sh && 
             while true; do 
               /usr/local/bin/check-replication-lag.sh; 
               sleep 10; 
             done"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica1:
        condition: service_healthy
      postgres-replica2:
        condition: service_healthy
    networks:
      - insavein-network
    profiles:
      - monitoring

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      PORT: 8080
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 168h
    ports:
      - "8080:8080"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      PORT: 8081
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8081:8081"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Savings Service
  savings-service:
    build:
      context: ./savings-service
      dockerfile: Dockerfile
    container_name: savings-service
    environment:
      PORT: 8082
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8082:8082"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Budget Service
  budget-service:
    build:
      context: ./budget-service
      dockerfile: Dockerfile
    container_name: budget-service
    environment:
      PORT: 8083
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8083:8083"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Goal Service
  goal-service:
    build:
      context: ./goal-service
      dockerfile: Dockerfile
    container_name: goal-service
    environment:
      PORT: 8005
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8005:8005"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Education Service
  education-service:
    build:
      context: ./education-service
      dockerfile: Dockerfile
    container_name: education-service
    environment:
      PORT: 8085
      DB_HOST: postgres-replica1
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8085:8085"
    depends_on:
      postgres-replica1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      PORT: 8086
      DB_HOST: postgres-replica1
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: notifications@insavein.com
      SMTP_PASSWORD: smtp-password
      SMTP_FROM: notifications@insavein.com
    ports:
      - "8086:8086"
    depends_on:
      postgres-replica1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Analytics Service
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      PORT: 8008
      DB_HOST: postgres-replica2
      DB_PORT: 5432
      DB_USER: insavein_user
      DB_PASSWORD: insavein_password
      DB_NAME: insavein
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
      CACHE_TTL: 3600
    ports:
      - "8008:8008"
    depends_on:
      postgres-replica2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - insavein-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://localhost:8080
      VITE_AUTH_SERVICE_URL: http://auth-service:8080
      VITE_USER_SERVICE_URL: http://user-service:8081
      VITE_SAVINGS_SERVICE_URL: http://savings-service:8082
      VITE_BUDGET_SERVICE_URL: http://budget-service:8083
      VITE_GOAL_SERVICE_URL: http://goal-service:8005
      VITE_EDUCATION_SERVICE_URL: http://education-service:8085
      VITE_NOTIFICATION_SERVICE_URL: http://notification-service:8086
      VITE_ANALYTICS_SERVICE_URL: http://analytics-service:8008
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      savings-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
      goal-service:
        condition: service_healthy
      education-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - insavein-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: insavein-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@insavein.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres-primary
    networks:
      - insavein-network
    profiles:
      - tools

volumes:
  postgres_primary_data:
    driver: local
  postgres_replica1_data:
    driver: local
  postgres_replica2_data:
    driver: local

networks:
  insavein-network:
    driver: bridge

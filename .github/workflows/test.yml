name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insavein
          POSTGRES_PASSWORD: insavein_test_password
          POSTGRES_DB: insavein_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - savings-service
          - budget-service
          - goal-service
          - education-service
          - notification-service
          - analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Run migrations
        working-directory: migrations
        env:
          DATABASE_URL: postgres://insavein:insavein_test_password@localhost:5432/insavein_test?sslmode=disable
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path . -database "$DATABASE_URL" up

      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        env:
          DATABASE_URL: postgres://insavein:insavein_test_password@localhost:5432/insavein_test?sslmode=disable
          JWT_SECRET: test_jwt_secret_key_for_ci
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insavein
          POSTGRES_PASSWORD: insavein_test_password
          POSTGRES_DB: insavein_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run migrations
        working-directory: migrations
        env:
          DATABASE_URL: postgres://insavein:insavein_test_password@localhost:5432/insavein_test?sslmode=disable
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path . -database "$DATABASE_URL" up

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://insavein:insavein_test_password@localhost:5432/insavein_test?sslmode=disable
          JWT_SECRET: test_jwt_secret_key_for_ci
        run: |
          # Run integration tests if they exist
          if [ -d "tests/integration" ]; then
            cd tests/integration
            go test -v -race ./...
          fi

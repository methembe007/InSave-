apiVersion: v1
kind: ResourceQuota
metadata:
  name: insavein-resource-quota
  namespace: insavein
  labels:
    app: insavein-platform
spec:
  hard:
    # Compute Resources
    requests.cpu: "50"           # Total CPU requests across all pods
    requests.memory: "100Gi"     # Total memory requests across all pods
    limits.cpu: "100"            # Total CPU limits across all pods
    limits.memory: "200Gi"       # Total memory limits across all pods
    
    # Storage Resources
    requests.storage: "500Gi"    # Total storage requests
    persistentvolumeclaims: "10" # Maximum number of PVCs
    
    # Object Counts
    pods: "100"                  # Maximum number of pods
    services: "20"               # Maximum number of services
    configmaps: "20"             # Maximum number of ConfigMaps
    secrets: "20"                # Maximum number of Secrets
    
  # Scope selectors for different priority classes
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["high", "medium", "low"]

---
apiVersion: v1
kind: LimitRange
metadata:
  name: insavein-limit-range
  namespace: insavein
  labels:
    app: insavein-platform
spec:
  limits:
  # Container limits
  - type: Container
    default:
      # Default limits (if not specified in pod spec)
      cpu: "1000m"      # 1 CPU core
      memory: "2Gi"
    defaultRequest:
      # Default requests (if not specified in pod spec)
      cpu: "100m"       # 0.1 CPU core
      memory: "256Mi"
    max:
      # Maximum allowed limits
      cpu: "4000m"      # 4 CPU cores
      memory: "8Gi"
    min:
      # Minimum required requests
      cpu: "50m"        # 0.05 CPU core
      memory: "64Mi"
    maxLimitRequestRatio:
      # Maximum ratio between limit and request
      cpu: "10"         # Limit can be max 10x the request
      memory: "4"       # Limit can be max 4x the request
  
  # Pod limits
  - type: Pod
    max:
      cpu: "8000m"      # 8 CPU cores per pod
      memory: "16Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
  
  # PersistentVolumeClaim limits
  - type: PersistentVolumeClaim
    max:
      storage: "100Gi"  # Maximum storage per PVC
    min:
      storage: "1Gi"    # Minimum storage per PVC

---
apiVersion: v1
kind: LimitRange
metadata:
  name: insavein-database-limits
  namespace: insavein
  labels:
    app: postgres
    component: database
spec:
  limits:
  # Special limits for database pods (higher resources)
  - type: Container
    default:
      cpu: "2000m"      # 2 CPU cores
      memory: "4Gi"
    defaultRequest:
      cpu: "500m"       # 0.5 CPU core
      memory: "2Gi"
    max:
      cpu: "8000m"      # 8 CPU cores
      memory: "16Gi"
    min:
      cpu: "250m"
      memory: "1Gi"

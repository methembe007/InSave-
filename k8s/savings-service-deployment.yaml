apiVersion: apps/v1
kind: Deployment
metadata:
  name: savings-service
  namespace: insavein
  labels:
    app: savings-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: savings-service
  template:
    metadata:
      labels:
        app: savings-service
        tier: backend
    spec:
      containers:
      - name: savings-service
        image: insavein/savings-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: PORT
          value: "8082"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_NAME
        - name: DB_SSLMODE
          value: "require"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: savings-service
  namespace: insavein
  labels:
    app: savings-service
spec:
  type: ClusterIP
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
    name: http
  selector:
    app: savings-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: savings-service-hpa
  namespace: insavein
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: savings-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

apiVersion: v1
kind: Secret
metadata:
  name: insavein-secrets
  namespace: insavein
  labels:
    app: insavein-platform
type: Opaque
stringData:
  # Database Credentials (Requirement 20.1 - Data encryption)
  # NOTE: In production, use external secret management (e.g., HashiCorp Vault, AWS Secrets Manager)
  # These are placeholder values that MUST be replaced before deployment
  DB_USER: "insavein_user"
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD_HERE"
  
  # Legacy keys for backward compatibility
  postgres.user: "insavein_user"
  postgres.password: "CHANGE_ME_STRONG_PASSWORD_HERE"
  db_user: "insavein_user"
  db_password: "CHANGE_ME_STRONG_PASSWORD_HERE"
  postgres.replica.user: "insavein_replica_user"
  postgres.replica.password: "CHANGE_ME_REPLICA_PASSWORD_HERE"
  
  # JWT Secret Key (Requirement 20.1)
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_64"
  jwt.secret: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_64"
  jwt_secret: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_64"
  
  # Email Service API Keys
  # SendGrid or AWS SES credentials
  EMAIL_API_KEY: "CHANGE_ME_EMAIL_SERVICE_API_KEY"
  EMAIL_API_SECRET: "CHANGE_ME_EMAIL_SERVICE_API_SECRET"
  
  # Push Notification Service
  # Firebase Cloud Messaging credentials
  FCM_SERVER_KEY: "CHANGE_ME_FCM_SERVER_KEY"
  FCM_PROJECT_ID: "CHANGE_ME_FCM_PROJECT_ID"
  
  # External API Keys (if needed for analytics/recommendations)
  OPENAI_API_KEY: "CHANGE_ME_OPENAI_API_KEY"
  
  # Encryption Keys for data at rest
  # Generate with: openssl rand -base64 32
  DATA_ENCRYPTION_KEY: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"
  
  # Session encryption key
  SESSION_ENCRYPTION_KEY: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: insavein
  labels:
    app: postgres
type: Opaque
stringData:
  # PostgreSQL superuser credentials
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_SUPERUSER_PASSWORD"
  
  # Replication user credentials
  REPLICATION_USER: "replicator"
  REPLICATION_PASSWORD: "CHANGE_ME_REPLICATION_PASSWORD"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: education-service
  namespace: insavein
  labels:
    app: education-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: education-service
  template:
    metadata:
      labels:
        app: education-service
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: education-service
        image: education-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8085
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_NAME
        - name: DB_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_SSLMODE
        - name: DB_REPLICA_HOST
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_REPLICA_HOST
        - name: DB_REPLICA_PORT
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: DB_REPLICA_PORT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: JWT_SECRET
        - name: PORT
          value: "8085"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: education-service
  namespace: insavein
  labels:
    app: education-service
spec:
  type: ClusterIP
  ports:
  - port: 8085
    targetPort: 8085
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: education-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: education-service-hpa
  namespace: insavein
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: education-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

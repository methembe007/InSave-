apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: insavein
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: PORT
          value: "8086"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: db_port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: db_password
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: insavein-config
              key: db_name
        - name: DB_SSLMODE
          value: "require"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: insavein-secrets
              key: jwt_secret
        - name: EMAIL_PROVIDER
          value: "mock"
        - name: EMAIL_FROM_ADDRESS
          value: "noreply@insavein.com"
        - name: PUSH_PROVIDER
          value: "mock"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: insavein
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
  - port: 8086
    targetPort: 8086
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: notification-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: insavein
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

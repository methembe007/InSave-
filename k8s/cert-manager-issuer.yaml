---
# ClusterIssuer for Let's Encrypt production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Email address for ACME registration
    email: admin@insavein.com
    
    # Name of the secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    
    # Enable HTTP-01 challenge provider
    solvers:
    - http01:
        ingress:
          class: nginx
---
# ClusterIssuer for Let's Encrypt staging (for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt staging server
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    
    # Email address for ACME registration
    email: admin@insavein.com
    
    # Name of the secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    
    # Enable HTTP-01 challenge provider
    solvers:
    - http01:
        ingress:
          class: nginx
---
# Certificate resource for api.insavein.com
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: insavein-tls
  namespace: insavein
spec:
  # Secret name where the certificate will be stored
  secretName: insavein-tls
  
  # Certificate duration (90 days)
  duration: 2160h # 90 days
  
  # Renew certificate 30 days before expiration
  renewBefore: 720h # 30 days
  
  # Subject information
  subject:
    organizations:
    - InSavein Platform
  
  # Common name
  commonName: api.insavein.com
  
  # DNS names
  dnsNames:
  - api.insavein.com
  - www.insavein.com
  - insavein.com
  
  # Issuer reference
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  
  # Private key configuration
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  
  # Usages
  usages:
  - digital signature
  - key encipherment
  - server auth
